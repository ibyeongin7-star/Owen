<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cocomi-memo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
  * { box-sizing: border-box; }
  body { margin:0; background:#0a0a0a; font-family:'Noto Sans JP',sans-serif; color:#EAE5D8; min-height:100vh; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 20px 14px 60px; }
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .title-jp { font-family:'Noto Serif JP',serif; font-weight:700; font-size:22px; letter-spacing:1px; }
  .subtitle { font-size:11px; color:#8a8474; letter-spacing:1px; }
  .btn { border:none; cursor:pointer; border-radius:999px; padding:9px 14px; font-weight:500; font-size:13px; font-family:'Noto Sans JP',sans-serif; }
  .btn-dark { background:#2a2a26; color:#EAE5D8; }
  .back { background:transparent; border:none; cursor:pointer; padding:6px; font-size:18px; color:#4a4438; }
  .grid5 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .card { border-radius:14px; padding:18px 16px; cursor:pointer; min-height:100px; transition:transform .15s; }
  .card:hover { transform: translateY(-3px); }
  .badge { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Noto Serif JP',serif; font-weight:700; font-size:17px; margin-bottom:10px; border-width:2px; border-style:solid; }
  .list-item { background:#F7F4EB; border:1px solid #dcd5c2; border-radius:12px; padding:14px 16px; margin-bottom:10px; cursor:pointer; }
  .item-title { font-weight:700; font-size:13px; margin-bottom:4px; }
  .item-text { font-size:13px; white-space:pre-wrap; max-height:54px; overflow:hidden; color:#2a2a26; }
  .item-date { font-size:11px; color:#a39c8a; margin-top:6px; }
  label { font-size:12px; color:#8a8474; display:block; margin:12px 0 5px; }
  input[type=text] { width:100%; padding:10px 12px; border:1px solid #d8d2c2; border-radius:8px; background:#FBF9F2; font-size:14px; font-family:'Noto Sans JP',sans-serif; }
  textarea {
    width:100%; min-height:300px; padding:12px 14px; border:1px solid #d8d2c2; border-radius:8px;
    background:#FBF9F2; resize:vertical; color:#2a2a26;
    font-family:'Noto Sans JP',sans-serif; font-size:15px; line-height:1.6; letter-spacing:normal;
  }
  .hint { font-size:11.5px; color:#a6332f; margin-top:6px; }
  .save-row { margin-top:16px; display:flex; gap:8px; }
  .empty { color:#8a8474; font-size:13px; padding:20px 0; }
  .detail-box { background:#FBF9F2; border:1px solid #d8d2c2; border-radius:8px; padding:12px; white-space:pre-wrap; font-size:14px; line-height:1.7; }
  .tag { display:inline-block; font-size:12px; padding:3px 10px; border-radius:999px; margin-bottom:10px; font-weight:500; }
  .del { background:transparent; border:1px solid #c2392f; color:#c2392f; border-radius:8px; padding:8px 12px; font-size:12px; cursor:pointer; margin-top:16px; }
  .tabbar { display:flex; gap:18px; margin-bottom:18px; border-bottom:1px solid #262620; }
  .tab { padding:0 0 10px; font-size:14px; color:#8a8474; cursor:pointer; border-bottom:2px solid transparent; font-weight:500; }
  .tab.active { color:#EAE5D8; border-bottom-color:#EAE5D8; font-weight:700; }
  .todo-add-row { display:flex; gap:8px; margin-bottom:16px; }
  .todo-add-row input { flex:1; }
  .todo-item { display:flex; align-items:flex-start; gap:10px; background:#151512; border:1px solid #2a2a26; border-radius:10px; padding:12px 14px; margin-bottom:8px; }
  .todo-check { width:20px; height:20px; border-radius:6px; border:2px solid #8a8474; flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; margin-top:2px; font-size:12px; color:#0a0a0a; }
  .todo-check.done { background:#8fae86; border-color:#8fae86; }
  .todo-text { flex:1; font-size:14px; line-height:1.5; word-break:break-word; padding-top:1px; }
  .todo-text.done { text-decoration:line-through; color:#6b6b66; }
  .todo-actions { display:flex; gap:4px; flex-shrink:0; }
  .icon-btn { background:transparent; border:none; color:#8a8474; cursor:pointer; font-size:15px; padding:2px 6px; }
  .todo-section-label { font-size:11px; color:#6b6b66; margin:18px 0 8px; letter-spacing:1px; }
  .todo-edit-row { display:flex; gap:6px; flex:1; }
  .todo-edit-row input { flex:1; padding:6px 8px; font-size:13px; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const EMOTIONS = {
  "기쁨": { jp:"喜び", color:"#B8891A", bg:"#FBF3E1", ring:"#E4C77A", kw:["기쁨","喜び"] },
  "슬픔": { jp:"悲しみ", color:"#3B4B6B", bg:"#EEF1F6", ring:"#9AACC9", kw:["슬픔","悲しみ"] },
  "사랑": { jp:"愛", color:"#A6332F", bg:"#F8ECEA", ring:"#D99490", kw:["사랑","愛"] },
  "화남": { jp:"怒り", color:"#232323", bg:"#EFEBE6", ring:"#B33A3A", kw:["화남","怒り"] },
  "의미없음": { jp:"無意味", color:"#6B6B66", bg:"#EFEEEA", ring:"#B7B5AC", kw:[] },
};
const ORDER = ["기쁨","슬픔","사랑","화남","의미없음"];
const STORE_KEY = "cocomi_memo_notes";

function loadNotes(){ try { return JSON.parse(localStorage.getItem(STORE_KEY) || "[]"); } catch(e){ return []; } }
function saveNotes(list){ localStorage.setItem(STORE_KEY, JSON.stringify(list)); }
function classify(title){
  const t = (title||"").trim();
  for (const emo of ORDER) {
    if (emo === "의미없음") continue;
    if (EMOTIONS[emo].kw.some(k => t.includes(k))) return emo;
  }
  return "의미없음";
}
function fmt(ts){ return new Date(ts).toLocaleString("ja-JP"); }

const STORE_KEY_TODO = "cocomi_memo_todos";
function loadTodos(){ try { return JSON.parse(localStorage.getItem(STORE_KEY_TODO) || "[]"); } catch(e){ return []; } }
function saveTodos(list){ localStorage.setItem(STORE_KEY_TODO, JSON.stringify(list)); }

let state = { tab:"memo", view:"folders", folder:null, noteId:null, editingTodoId:null };
let notes = loadNotes();
let todos = loadTodos();

function render(){
  const app = document.getElementById("app");
  const showBack = state.tab==='memo' && state.view!=='folders';
  let html = `<div class="header">
    <div style="display:flex;align-items:center;gap:10px;">
      ${showBack ? `<button class="back" onclick="goBack()">←</button>` : ''}
      <div></div>
    </div>
    ${state.tab==='memo' ? `<button class="btn btn-dark" onclick="state.view='compose'; render();">+</button>` : ''}
  </div>
  <div class="tabbar">
    <div class="tab ${state.tab==='memo'?'active':''}" onclick="state.tab='memo';render();">メモ</div>
    <div class="tab ${state.tab==='todo'?'active':''}" onclick="state.tab='todo';render();">To-do</div>
  </div>`;

  if (state.tab === 'todo') {
    html += renderTodo();
    app.innerHTML = html;
    return;
  }

  if (state.view === "folders") {
    html += `<div class="grid5">`;
    ORDER.forEach(emo => {
      const c = EMOTIONS[emo];
      const count = notes.filter(n=>n.emotion===emo).length;
      html += `<div class="card" style="background:${c.bg};border:1px solid ${c.ring};" onclick="state.view='folder';state.folder='${emo}';render();">
        <div class="badge" style="border-color:${c.color};color:${c.color};">${c.jp[0]}</div>
        <div style="font-weight:700;font-size:15px;font-family:'Noto Serif JP',serif;color:${c.color};">${c.jp}</div>
        <div style="font-size:12px;color:#8a8474;margin-top:4px;">${count}件のメモ</div>
      </div>`;
    });
    html += `</div>`;
  }

  if (state.view === "folder") {
    const c = EMOTIONS[state.folder];
    const list = notes.filter(n=>n.emotion===state.folder).sort((a,b)=>b.createdAt-a.createdAt);
    html += `<div style="font-weight:700;color:${c.color};margin-bottom:12px;font-family:'Noto Serif JP',serif;">${c.jp}</div>`;
    if (list.length===0) html += `<div class="empty">まだこの感情のメモはありません。</div>`;
    list.forEach(n => {
      html += `<div class="list-item" onclick="state.view='detail';state.noteId='${n.id}';state.editing=false;render();">
        <div class="item-title">${n.title || '（タイトルなし）'}</div>
        <div class="item-text">${escapeHtml(n.text)}</div>
        <div class="item-date">${fmt(n.createdAt)}</div>
      </div>`;
    });
  }

  if (state.view === "compose") {
    html += `
      <label>タイトル（喜び / 悲しみ / 愛 / 怒り のいずれかを書くと自動分類されます）</label>
      <input type="text" id="titleInput" placeholder="例: 喜び、悲しみ…">
      <div class="hint">何も書かなければ「無意味」に分類されます。</div>
      <label>内容</label>
      <textarea id="textInput" placeholder="今、感じていることを書いてください…"></textarea>
      <div class="save-row">
        <button class="btn btn-dark" style="flex:1;" onclick="submitNote()">メモを残す</button>
      </div>
    `;
  }

  if (state.view === "detail") {
    const n = notes.find(x=>x.id===state.noteId);
    if (n) {
      const c = EMOTIONS[n.emotion];
      if (state.editing) {
        html += `
          <label>タイトル（喜び / 悲しみ / 愛 / 怒り のいずれかを書くと自動分類されます）</label>
          <input type="text" id="editTitleInput" value="${escapeAttr(n.title)}" placeholder="例: 喜び、悲しみ…">
          <div class="hint">何も書かなければ「無意味」に分類されます。</div>
          <label>内容</label>
          <textarea id="editTextInput">${escapeHtml(n.text)}</textarea>
          <div class="save-row">
            <button class="btn btn-dark" style="flex:1;" onclick="saveEdit('${n.id}')">保存する</button>
            <button class="btn" style="background:transparent;border:1px solid #8a8474;color:#EAE5D8;" onclick="state.editing=false;render();">キャンセル</button>
          </div>
        `;
      } else {
        html += `<span class="tag" style="background:${c.bg};color:${c.color};border:1px solid ${c.ring};">${c.jp}</span>${n.updatedAt ? `<span class="tag" style="background:#2a2a26;color:#EAE5D8;border:1px solid #4a4438;margin-left:6px;">編集済み</span>` : ''}
          <div style="font-size:11px;color:#a39c8a;margin-bottom:10px;">${fmt(n.createdAt)} ・ タイトル: ${n.title || '（なし）'}</div>
          <div class="detail-box">${escapeHtml(n.text)}</div>
          <div style="display:flex;gap:8px;margin-top:16px;">
            <button class="btn btn-dark" onclick="state.editing=true;render();">編集する</button>
            <button class="del" onclick="deleteNote('${n.id}')">このメモを削除</button>
          </div>`;
      }
    }
  }

  app.innerHTML = html;
}

function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escapeAttr(s){ return escapeHtml(s); }

function goBack(){
  state.editing = false;
  if (state.view==='detail') state.view = 'folder';
  else if (state.view==='folder') state.view='folders';
  else if (state.view==='compose') state.view='folders';
  render();
}

function submitNote(){
  const title = document.getElementById("titleInput").value;
  const text = document.getElementById("textInput").value.trim();
  if (!text) return;
  const note = {
    id: 'n_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
    title: title.trim(),
    text,
    emotion: classify(title),
    createdAt: Date.now(),
  };
  notes.unshift(note);
  saveNotes(notes);
  state.view = 'folders';
  render();
}

function saveEdit(id){
  const title = document.getElementById("editTitleInput").value;
  const text = document.getElementById("editTextInput").value.trim();
  if (!text) return;
  notes = notes.map(n => n.id===id ? {
    ...n,
    title: title.trim(),
    text,
    emotion: classify(title),
    updatedAt: Date.now(),
  } : n);
  saveNotes(notes);
  state.editing = false;
  render();
}

function deleteNote(id){
  notes = notes.filter(n=>n.id!==id);
  saveNotes(notes);
  state.view='folder';
  render();
}

function renderTodo(){
  const pending = todos.filter(t=>!t.done).sort((a,b)=>b.createdAt-a.createdAt);
  const done = todos.filter(t=>t.done).sort((a,b)=>(b.updatedAt||b.createdAt)-(a.updatedAt||a.createdAt));

  let h = `<div class="todo-add-row">
    <input type="text" id="todoInput" placeholder="やることを入力…" onkeydown="if(event.key==='Enter')addTodo();">
    <button class="btn btn-dark" onclick="addTodo()">追加</button>
  </div>`;

  if (todos.length === 0) {
    h += `<div class="empty">まだTo-doがありません。</div>`;
    return h;
  }

  const renderItem = (t) => {
    if (state.editingTodoId === t.id) {
      return `<div class="todo-item">
        <div class="todo-edit-row">
          <input type="text" id="todoEditInput_${t.id}" value="${escapeAttr(t.text)}" onkeydown="if(event.key==='Enter')saveTodoEdit('${t.id}');">
          <button class="icon-btn" onclick="saveTodoEdit('${t.id}')">✓</button>
          <button class="icon-btn" onclick="state.editingTodoId=null;render();">✕</button>
        </div>
      </div>`;
    }
    return `<div class="todo-item">
      <div class="todo-check ${t.done?'done':''}" onclick="toggleTodo('${t.id}')">${t.done ? '✓' : ''}</div>
      <div class="todo-text ${t.done?'done':''}">${escapeHtml(t.text)}</div>
      <div class="todo-actions">
        <button class="icon-btn" onclick="state.editingTodoId='${t.id}';render();">✎</button>
        <button class="icon-btn" onclick="deleteTodo('${t.id}')">🗑</button>
      </div>
    </div>`;
  };

  pending.forEach(t => { h += renderItem(t); });

  if (done.length > 0) {
    h += `<div class="todo-section-label">完了 (${done.length})</div>`;
    done.forEach(t => { h += renderItem(t); });
  }

  return h;
}

function addTodo(){
  const input = document.getElementById("todoInput");
  const text = input.value.trim();
  if (!text) return;
  todos.unshift({ id:'t_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), text, done:false, createdAt:Date.now() });
  saveTodos(todos);
  render();
}

function toggleTodo(id){
  todos = todos.map(t => t.id===id ? { ...t, done: !t.done, updatedAt: Date.now() } : t);
  saveTodos(todos);
  render();
}

function saveTodoEdit(id){
  const input = document.getElementById("todoEditInput_"+id);
  const text = input.value.trim();
  if (!text) return;
  todos = todos.map(t => t.id===id ? { ...t, text, updatedAt: Date.now() } : t);
  saveTodos(todos);
  state.editingTodoId = null;
  render();
}

function deleteTodo(id){
  todos = todos.filter(t=>t.id!==id);
  saveTodos(todos);
  render();
}

render();
</script>
</body>
</html>
